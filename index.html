<!DOCTYPE html>
 <html>
  <head>
   <title>Countdown</title>
  </head>
  <body style="background-color:grey;">
  <h1 style="font-family:arial; text-align:center; color:purple;">Virtual LGXMUN (first edition) starting time:9AM, 22 July 2026</h1>
  <h1 style="font-family:arial; color:purple; text-align:center;">Time left:</h2>
  
  <p id = "countdown" style = "font-family:arial; color:Gold; text-align:center; font-size:60px;"></p>
  <h6 style="font-family:arial; text-align:center; color:white;">created by bilal zagham</h6>
  <script>
  
  function updateCountdown() {
  const now = new Date();
  const mun_day = new Date("2026-07-22T09:00:00+05:00");
  const diff = mun_day-now;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor(diff / (1000 * 60 * 60) % 24);
  const mins = Math.floor(diff / (1000 * 60) % 60);
  const seconds = Math.floor(diff / (1000) % 60);
  
  document.getElementById("countdown").textContent = `${days}days, ${hours}hours, ${mins}minutes, ${seconds}seconds`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
  
  </script>
  </body>
 </html>
