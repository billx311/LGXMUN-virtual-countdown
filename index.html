<!DOCTYPE html>
 <html>
  <head>
   <title>countdown</title>
  </head>
  <body style="color:grey;"
  <h1 style="font-family:arial; text-align:centre; color:DarkBlue">Virtual LGXMUN (first edition) starting time: 22 July 2026, 9AM</h1>
  <h2 style="font-family:arial; color:DarkBlue; text-align:center;">Time left:</h2>
  
  <p id = "countdown" style = "font-family:arial; color:Gold; text-align:center; font-size:35px;"></p>
  <script>
  function updateCountdown() {
  const now = new Date();
  const mun_day = new Date("2026-07-22T09:00:00+05:00");
  const diff = mun_day-now;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor(diff / (1000 * 60 * 60) % 24);
  const mins = Math.floor(diff / (1000 * 60) % 60);
  const seconds = Math.floor(diff / (1000) % 60);
  
  document.getElementById("countdown").textContent = `${days}days, ${hours}hours, ${mins}minutes, ${seconds}seconds`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
  
  </script>
  </body>
 </html>
